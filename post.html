<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>포스트</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        :root {
            --bg-primary: #f8f8f6;
            --bg-secondary: #fafaf8;
            --text-primary: #1a1a1a;
            --text-secondary: #333;
            --text-tertiary: #666;
            --accent-primary: #4a6fa5;
            --border-color: rgba(26, 26, 26, 0.1);
            --border-color-light: rgba(26, 26, 26, 0.05);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .post-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
            background: white;
            min-height: 100vh;
        }

        .post-header {
            margin-bottom: 2rem;
        }

        .post-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            margin-bottom: 1rem;
            line-height: 1.3;
            color: var(--text-primary);
        }

        .post-meta {
            display: flex;
            gap: 2rem;
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.95rem;
        }

        .post-meta-item {
            color: var(--text-secondary);
        }

        .post-meta-label {
            color: var(--text-tertiary);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 0.8rem;
            margin-right: 0.5rem;
        }

        .post-content {
            font-size: 1.05rem;
            line-height: 1.9;
            color: var(--text-secondary);
            margin-bottom: 3rem;
        }

        .post-content p {
            margin-bottom: 1.5rem;
        }

        .post-content h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            margin-top: 2rem;
            margin-bottom: 1rem;
            color: var(--text-primary);
            line-height: 1.3;
        }

        .post-content h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            margin-top: 1.5rem;
            margin-bottom: 0.8rem;
            color: var(--text-primary);
        }

        .post-content h4 {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            margin-top: 1.2rem;
            margin-bottom: 0.6rem;
            color: var(--text-primary);
            font-weight: 600;
        }

        .post-content strong {
            font-weight: 600;
            color: var(--text-primary);
        }

        .post-content a {
            color: var(--accent-primary);
            text-decoration: none;
            border-bottom: 1px solid rgba(74, 111, 165, 0.25);
        }

        .post-content a:hover {
            color: #3a5a85;
            border-bottom-color: currentColor;
        }

        .post-content em {
            font-style: italic;
            color: #555;
        }

        .post-content ul {
            margin-left: 2rem;
            margin-bottom: 1.5rem;
            list-style: disc;
        }

        .post-content ul li {
            margin-bottom: 0.5rem;
            line-height: 1.6;
        }

        .post-content ol {
            margin-left: 2rem;
            margin-bottom: 1.5rem;
            list-style: decimal;
        }

        .post-content ol li {
            margin-bottom: 0.5rem;
            line-height: 1.6;
        }

        .post-content hr {
            border: none;
            border-top: 2px solid var(--border-color);
            margin: 2rem 0;
        }

        .post-content blockquote {
            border-left: 4px solid var(--accent-primary);
            padding-left: 1.5rem;
            margin-left: 0;
            margin-bottom: 1.5rem;
            color: #555;
            font-style: italic;
        }

        .post-content code {
            font-family: 'Monaco', 'Courier New', monospace;
            background: var(--bg-secondary);
            padding: 0.2rem 0.4rem;
            border-radius: 3px;
            color: #c41d1d;
            font-size: 0.9em;
        }

        .post-content table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1.5rem;
            border: 1px solid var(--border-color);
        }

        .post-content table th,
        .post-content table td {
            border: 1px solid var(--border-color);
            padding: 0.8rem 1rem;
            text-align: left;
        }

        .post-content table th {
            background: var(--bg-secondary);
            font-weight: 600;
            color: var(--text-primary);
        }

        .post-content table tr:hover {
            background: var(--bg-secondary);
        }

        .post-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-bottom: 2rem;
        }

        .post-tag {
            display: inline-block;
            background: var(--bg-secondary);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            border: 1px solid var(--border-color-light);
        }

        .attachments-section {
            margin-bottom: 3rem;
            padding: 2rem;
            background:
                radial-gradient(circle at top right, rgba(74, 111, 165, 0.12), transparent 40%),
                linear-gradient(135deg, #f6f7fb 0%, #eef2f7 100%);
            border: 1px solid rgba(74, 111, 165, 0.18);
            border-radius: 18px;
            box-shadow: 0 16px 36px rgba(32, 52, 84, 0.08);
        }

        .attachments-section h3 {
            font-size: 1.15rem;
            margin-bottom: 0.4rem;
            color: var(--text-primary);
        }

        .attachments-intro {
            color: var(--text-secondary);
            margin-bottom: 1.4rem;
        }

        .attachments-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1rem;
        }

        .attachment-link {
            text-decoration: none;
            color: inherit;
        }

        .attachment-item {
            height: 100%;
            padding: 1.2rem;
            border: 1px solid rgba(74, 111, 165, 0.16);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.82);
            transition:
                transform 0.25s ease,
                box-shadow 0.25s ease,
                border-color 0.25s ease;
        }

        .attachment-link:hover .attachment-item {
            transform: translateY(-3px);
            border-color: rgba(74, 111, 165, 0.45);
            box-shadow: 0 12px 24px rgba(46, 74, 112, 0.12);
        }

        .attachment-type {
            display: inline-flex;
            align-items: center;
            margin-bottom: 0.8rem;
            padding: 0.3rem 0.7rem;
            border-radius: 999px;
            background: rgba(74, 111, 165, 0.12);
            color: var(--accent-primary);
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .attachment-title {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.5;
        }

        .attachment-meta {
            display: block;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            color: var(--text-tertiary);
            word-break: break-word;
        }

        .attachment-action {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            color: var(--accent-primary);
            font-weight: 600;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 2rem;
            color: var(--accent-primary);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: #3a5a85;
        }

        @media (max-width: 768px) {
            .post-container {
                padding: 1rem;
            }

            .post-title {
                font-size: 1.8rem;
            }

            .post-content {
                font-size: 1rem;
            }

            .post-meta {
                flex-direction: column;
                gap: 1rem;
            }
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--accent-primary);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #3a5a85;
        }
    </style>
</head>
<body>
    <div class="post-container">
        
        <div class="post-header">
            <h1 class="post-title" id="postTitle">로딩 중...</h1>
            <div class="post-meta">
                <div class="post-meta-item">
                    <span class="post-meta-label">Issue date</span>
                    <span id="postDate"></span>
                </div>
            </div>
        </div>

        <div id="attachmentsSection"></div>

        <div class="post-content" id="postContent"></div>

        <div id="postTags"></div>
    </div>

    <script>
        // ==================== MARKDOWN PARSER ====================
        function parseMarkdown(text) {
            if (!text) return '';

            let html = text;

            // 코드 블록 먼저 보호 (인라인 처리 전)
            const codeBlocks = [];
            html = html.replace(/```[\s\S]*?```/g, (match) => {
                codeBlocks.push(match);
                return `___CODE_BLOCK_${codeBlocks.length - 1}___`;
            });

            // 인라인 코드 보호
            const inlineCodes = [];
            html = html.replace(/`([^`]+)`/g, (match, code) => {
                inlineCodes.push(code);
                return `___INLINE_CODE_${inlineCodes.length - 1}___`;
            });

            // 제목 변환 (# 부터 #### 까지)
            html = html.replace(/^#### (.*?)$/gm, '<h4>$1</h4>');
            html = html.replace(/^### (.*?)$/gm, '<h3>$1</h3>');
            html = html.replace(/^## (.*?)$/gm, '<h2>$1</h2>');
            html = html.replace(/^# (.*?)$/gm, '<h1>$1</h1>');

            // 굵은 텍스트 변환
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/__(.*?)__/g, '<strong>$1</strong>');
            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');

            // 이탤릭 텍스트 변환 (너무 탐욕적이지 않게)
            html = html.replace(/\*([^\*]+)\*/g, '<em>$1</em>');
            html = html.replace(/_([^_]+)_/g, '<em>$1</em>');

            // 수평선 변환 (---, ***, ___)
            html = html.replace(/^(\-\-\-|\*\*\*|___)\s*$/gm, '<hr>');

            // 인용 변환
            html = html.replace(/^> (.*?)$/gm, '<blockquote>$1</blockquote>');

            // 순서 없는 리스트 변환 (전역 처리)
            while (/^[\*\-\+] .+/m.test(html)) {
                html = html.replace(/^([\*\-\+] .+(?:\n(?:[\*\-\+] .+|$))*)/m, function(match) {
                    const items = match.split('\n').filter(line => line.trim() && /^[\*\-\+]/.test(line)).map(line => {
                        return '<li>' + line.replace(/^[\*\-\+]\s+/, '').trim() + '</li>';
                    });
                    return items.length > 0 ? '<ul>' + items.join('') + '</ul>' : match;
                });
            }

            // 순서 있는 리스트 변환 (전역 처리)
            while (/^\d+\. .+/m.test(html)) {
                html = html.replace(/^(\d+\. .+(?:\n(?:\d+\. .+|$))*)/m, function(match) {
                    const items = match.split('\n').filter(line => line.trim() && /^\d+\./.test(line)).map(line => {
                        return '<li>' + line.replace(/^\d+\.\s+/, '').trim() + '</li>';
                    });
                    return items.length > 0 ? '<ol>' + items.join('') + '</ol>' : match;
                });
            }

            // 테이블 변환 (개선된 버전)
            html = html.replace(/^\|(.+)\n\|[\s\-:|]+(?:\n|$)((?:\|.+\n)*)/gm, function(fullMatch) {
                const lines = fullMatch.split('\n').filter(line => line.trim() && line.includes('|'));
                if (lines.length < 2) return fullMatch;
                
                const headerLine = lines[0];
                let bodyLines = lines.slice(2); // 첫 줄은 헤더, 둘째 줄은 구분선
                
                const parseRow = (line) => {
                    return line
                        .split('|')
                        .map(cell => cell.trim())
                        .filter(cell => cell && !cell.match(/^[\s\-:]*$/));
                };
                
                const headerCells = parseRow(headerLine);
                const headerHtml = '<thead><tr>' + headerCells.map(cell => `<th>${cell}</th>`).join('') + '</tr></thead>';
                
                const bodyRows = bodyLines
                    .filter(line => line.trim() && line.includes('|'))
                    .map(line => {
                        const cells = parseRow(line);
                        return '<tr>' + cells.map(cell => `<td>${cell}</td>`).join('') + '</tr>';
                    })
                    .join('');
                
                return '<table>' + headerHtml + '<tbody>' + bodyRows + '</tbody></table>';
            });

            // 단락 변환 (빈 줄로 구분된 텍스트)
            const paragraphs = html.split(/\n\n+/).map(para => {
                para = para.trim();
                if (para && !para.match(/^<[a-z]/) && !para.match(/^<\/[a-z]/)) {
                    return `<p>${para}</p>`;
                }
                return para || '';
            }).filter(p => p);
            html = paragraphs.join('');

            // 중복 태그 제거
            html = html.replace(/<p>(<h[1-4]>.*?<\/h[1-4]>)<\/p>/g, '$1');
            html = html.replace(/<p>(<ul>[\s\S]*?<\/ul>)<\/p>/g, '$1');
            html = html.replace(/<p>(<ol>[\s\S]*?<\/ol>)<\/p>/g, '$1');
            html = html.replace(/<p>(<blockquote>.*?<\/blockquote>)<\/p>/g, '$1');

            // 인라인 코드 복원
            html = html.replace(/___INLINE_CODE_(\d+)___/g, (match, idx) => {
                return `<code>${inlineCodes[parseInt(idx)]}</code>`;
            });

            // 코드 블록 복원
            html = html.replace(/___CODE_BLOCK_(\d+)___/g, (match, idx) => {
                const block = codeBlocks[parseInt(idx)];
                const code = block.replace(/^```\n?/, '').replace(/\n?```$/, '');
                return `<pre><code>${code}</code></pre>`;
            });

            return html;
        }

        function getAttachmentPresentation(attachment) {
            switch (attachment.kind) {
                case 'pdf':
                    return {
                        badge: 'PDF',
                        action: 'Download paper',
                        meta: 'Research paper',
                        download: true
                    };
                case 'repo':
                case 'external':
                    return {
                        badge: 'Code',
                        action: 'Open repository',
                        meta: 'External resource',
                        download: false
                    };
                default:
                    return {
                        badge: 'File',
                        action: 'Open resource',
                        meta: 'Attached file',
                        download: false
                    };
            }
        }

        function renderAttachments(attachments) {
            const attachmentsList = attachments.map((attachment) => {
                const presentation = getAttachmentPresentation(attachment);
                const href = encodeURI(attachment.path);
                const target = attachment.isExternal ? ' target="_blank" rel="noopener noreferrer"' : '';
                const download = presentation.download ? ' download' : '';

                return `
                    <a class="attachment-link" href="${href}"${target}${download}>
                        <div class="attachment-item">
                            <span class="attachment-type">${presentation.badge}</span>
                            <span class="attachment-title">${attachment.label}</span>
                            <span class="attachment-meta">${presentation.meta}</span>
                            <span class="attachment-action">${presentation.action} ${presentation.download ? '↓' : '↗'}</span>
                        </div>
                    </a>
                `;
            }).join('');

            return `
                <div class="attachments-section">
                    <h3>Research Resources</h3>
                    <p class="attachments-intro">You can directly open or download the paper PDF and code repository.</p>
                    <div class="attachments-grid">
                        ${attachmentsList}
                    </div>
                </div>
            `;
        }

        // ==================== POST LOADER ====================
        function loadPost() {
            const postData = localStorage.getItem('currentPost');
            if (!postData) {
                document.getElementById('postContent').innerHTML = '<p>포스트를 찾을 수 없습니다.</p>';
                return;
            }

            const post = JSON.parse(postData);

            // 제목과 날짜 설정
            document.getElementById('postTitle').textContent = post.title;
            document.getElementById('postDate').textContent = post.date;

            // 마크다운 파싱
            const parsed = parseMarkdown(post.content);
            document.getElementById('postContent').innerHTML = parsed;

            // 태그 설정
            if (post.tags && post.tags.length > 0) {
                document.getElementById('postTags').innerHTML = `
                    <div class="post-tags">
                        ${post.tags.map(tag => `<span class="post-tag">${tag}</span>`).join('')}
                    </div>
                `;
            }

            // 첨부파일 설정
            if (post.attachments && post.attachments.length > 0) {
                document.getElementById('attachmentsSection').innerHTML = renderAttachments(post.attachments);
            }

            // 페이지 제목 설정
            document.title = post.title + ' — JiWoo Park';
        }

        // 페이지 로드 시 포스트 로드
        window.addEventListener('DOMContentLoaded', loadPost);
    </script>
</body>
</html>
